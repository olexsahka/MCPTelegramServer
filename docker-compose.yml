services:
  postgres:
    image: postgres:16
    container_name: mcp_telegram_postgres
    environment:
      POSTGRES_DB: mcp_telegram
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # No ports exposed — only accessible inside Docker network
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mcp_telegram_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --protected-mode yes
    # No ports exposed — only accessible inside Docker network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: mcp_telegram_app
    ports:
      # Bind only to localhost — Nginx/proxy handles external access
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mcp_telegram
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      TELEGRAM_PHONE: ${TELEGRAM_PHONE}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      MCP_USERNAME: ${MCP_USERNAME:-mcp}
      MCP_PASSWORD: ${MCP_PASSWORD:-changeme}
      MCP_ADMIN_USERNAME: ${MCP_ADMIN_USERNAME:-admin}
      MCP_ADMIN_PASSWORD: ${MCP_ADMIN_PASSWORD:-admin}
    volumes:
      - tdlib_data:/app/tdlib-data
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: false  # app needs internet for Telegram MTProto

volumes:
  postgres_data:
  redis_data:
  tdlib_data:
