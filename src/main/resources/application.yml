spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mcp_telegram}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}

server:
  port: ${SERVER_PORT:8080}
  # Limit connections — single-user server
  tomcat:
    max-connections: 20
    max-threads: 10
    accept-count: 5
    connection-timeout: 10000

telegram:
  api-id: ${TELEGRAM_API_ID}
  api-hash: ${TELEGRAM_API_HASH}
  phone: ${TELEGRAM_PHONE}
  database-directory: ${TELEGRAM_DB_DIR:./tdlib-data}

mcp:
  auth:
    username: ${MCP_USERNAME}
    password: ${MCP_PASSWORD}
  admin:
    username: ${MCP_ADMIN_USERNAME}
    password: ${MCP_ADMIN_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
