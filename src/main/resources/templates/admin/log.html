<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Log - MCP Telegram Server</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/admin">MCP Telegram Server</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/admin">Dashboard</a>
            <a class="nav-link" href="/admin/dialogs">Dialogs</a>
            <a class="nav-link active" href="/admin/log">Live Log</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h1>Live Message Log</h1>
    <p><span id="status" class="badge bg-secondary">Disconnected</span></p>
    <table class="table table-striped" id="log-table">
        <thead>
            <tr>
                <th>Time</th>
                <th>Chat ID</th>
                <th>Sender</th>
                <th>Message</th>
            </tr>
        </thead>
        <tbody id="log-body">
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
