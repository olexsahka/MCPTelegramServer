<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dialog - MCP Telegram Server</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/admin">MCP Telegram Server</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/admin">Dashboard</a>
            <a class="nav-link active" href="/admin/dialogs">Dialogs</a>
            <a class="nav-link" href="/admin/log">Live Log</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h1 th:text="${dialog.title}">Dialog</h1>
    <p>Type: <span th:text="${dialog.type}">-</span></p>
    <a href="/admin/dialogs" class="btn btn-secondary mb-3">Back</a>

    <h3>Last 50 Messages</h3>
    <div class="list-group">
        <div class="list-group-item" th:each="msg : ${messages}">
            <div class="d-flex justify-content-between">
                <strong th:text="${msg.sender?.firstName ?: 'Unknown'}">Sender</strong>
                <small th:text="${msg.sentAt}">Time</small>
            </div>
            <p class="mb-1" th:text="${msg.text}">Message text</p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
