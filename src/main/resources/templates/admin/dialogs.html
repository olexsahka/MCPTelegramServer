<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dialogs - MCP Telegram Server</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/admin">MCP Telegram Server</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/admin">Dashboard</a>
            <a class="nav-link active" href="/admin/dialogs">Dialogs</a>
            <a class="nav-link" href="/admin/log">Live Log</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h1>Dialogs</h1>
    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Title</th>
                <th>Type</th>
                <th>Last Message</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="dialog : ${dialogs}">
                <td th:text="${dialog.title}">-</td>
                <td th:text="${dialog.type}">-</td>
                <td th:text="${dialog.lastMessageAt}">-</td>
                <td>
                    <a th:href="@{/admin/dialogs/{id}(id=${dialog.id})}" class="btn btn-sm btn-primary">View</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
