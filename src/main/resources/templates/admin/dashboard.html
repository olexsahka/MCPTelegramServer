<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - MCP Telegram Server</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/admin">MCP Telegram Server</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/admin">Dashboard</a>
            <a class="nav-link" href="/admin/dialogs">Dialogs</a>
            <a class="nav-link" href="/admin/log">Live Log</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h1>Dashboard</h1>
    <div class="row mt-3">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5 class="card-title">Dialogs</h5>
                    <p class="card-text display-4" th:text="${dialogCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Messages</h5>
                    <p class="card-text display-4" th:text="${messageCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-secondary">
                <div class="card-body">
                    <h5 class="card-title">TDLib Status</h5>
                    <p class="card-text">Pending setup</p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
